<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>Messagerie Peer To Peer</title>
    <link href="style.css" rel="stylesheet" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body>
    <h1>Messagerie Nathoup2p</h1>
    <div class="container">
      <div class="container-connected">
        <div>Connecté : <span id="connected">1</span></div>
      </div>

      <div class="container-button">
        <button>a</button><button>b</button><button>c</button><button>d</button>
        <button>e</button>
        
      </div>
      <div class="container-text">
        <div>Veuillez entrer un port (entre 1000-9999): 
          <input type="text" id="port" minlength="4" maxlength="4" size="5"/>
        </div>
        <input type="text" id="keyboard" minlength="1"/>
      </div>

      <div id="screen">
        <div class="screen">
            <span id="screen-text"></span>
        </div>
        <span id="screen-archive"></span> 
      </div>

    </div>
    <footer></footer>
    <script src="script.js"></script>
    <script src="websocket.js"></script>
  </body>
</html>
